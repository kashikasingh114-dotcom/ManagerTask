<!DOCTYPE html>
<html>
<head>
    <title>Task Dashboard</title>

<style>

/* LIGHT MODE */
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #667eea, #764ba2);
}
/* DARK MODE */
body.dark {
    background: #0f172a;
    color: #e2e8f0;
}

/* LAYOUT */
.container {
    width: 90%;
    margin: 40px auto;
    display: grid;
    grid-template-columns: 280px 1fr 320px;
    gap: 20px;
}

.box {
    background: rgba(255, 255, 255, 0.95);
    padding: 20px;
    border-radius: 16px;
    backdrop-filter: blur(10px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.box:hover {
    transform: translateY(-5px);
}

body.dark {
    background: #0f172a;
}

body.dark .box {
    background: #1e293b;
}

/* INFO */
.info p {
    margin: 8px 0;
}

/* CENTER */
.center {
    text-align: center;
}

/* RING CIRCLE */
.circle {
    width: 170px;
    height: 170px;
    border-radius: 50%;
    margin: 20px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: bold;
    background: conic-gradient(#22c55e 0deg, #e5e7eb 0deg);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
.circle::before {
    content: "";
    position: absolute;
    width: 100px;
    height: 100px;
    background: white;
    border-radius: 50%;
}

body.dark .circle::before {
    background: #0f172a;
}

.circle span {
    position: relative;
    z-index: 2;
}

/* CALENDAR */
#calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
}

.day {
    height: 45px;
    border-radius: 10px;
    background: white;
    border: 1px solid #ddd;
    font-weight: 500;
    transition: 0.2s;
}

.day:hover {
    background: #22c55e;
    color: white;
    transform: scale(1.1);
}

body.dark .day {
    background: #1e293b;
    color: #e2e8f0;
    border: 1px solid #334155;
}

.day.done {
    background: #22c55e;
    color: white;
}

.day.disabled {
    background: #e0e0e0;
    color: #888;
    pointer-events: none;
    opacity: 0.5;
    cursor: not-allowed;
}

/* NAV */
.month-nav {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

button {
    background: #22c55e;
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
}
button:hover {
    background: #4f46e5;
}
/* TOGGLE */
.theme-toggle {
    position: fixed;
    right: 20px;
    top: 20px;
    background: #ddd;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}

body.dark .theme-toggle {
    background: #1e293b;
    color: white;
}
h2, h3 {
    margin-bottom: 15px;
    font-weight: 600;
    text-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
.day.today {
    border: 2px solid #3b82f6;
}
.info p {
    background: rgba(0,0,0,0.05);
    padding: 8px;
    border-radius: 8px;
    font-size: 14px;
}

body.dark .info p {
    background: rgba(255,255,255,0.05);
}
#progressText {
    font-size: 16px;
    margin-top: 10px;
    font-weight: 500;
}
#streakText {
    font-size: 14px;
    margin-top: 10px;
    background: rgba(255,165,0,0.2);
    padding: 6px 10px;
    border-radius: 8px;
    display: inline-block;
}
.container {
    min-height: 90vh;
    align-items: start;
}
.box button {
    margin-top: 15px;
}

</style>
</head>

<body>

<div class="container">

    <!-- LEFT -->
    <div class="box">
    <h2>📌 Task Details</h2>
    <div class="info">
        <h3 id="taskTitle"></h3>
        <p id="category"></p>
        <p id="priority"></p>
        <p id="duration"></p>
    </div>
</div> 
    <!-- CENTER -->
    <div class="box center">
        <h2>📌 Task Details</h2>

        <h3>📊 Progress</h3>
        <div class="circle" id="circle">
            <span id="percent">0%</span>
        </div>

        <p id="progressText"></p>
        <p id="streakText">🔥 Streak: 0</p>
    </div>

    <!-- RIGHT -->
    <div class="box">
        <div class="month-nav">
            <button onclick="prevMonth()">⬅</button>
            <span id="monthTitle"></span>
            <button onclick="nextMonth()">➡</button>
        </div>
        <div style="display:grid; grid-template-columns:repeat(7,1fr); text-align:center; font-size:12px; margin-bottom:5px;">
        <div>Sun</div><div>Mon</div><div>Tue</div>
        <div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
        </div>

        <div id="calendar"></div>
        <button onclick="saveProgress()">💾 Save Progress</button>
    </div>

</div>

<div class="theme-toggle" onclick="toggleDarkMode()">🌙</div>

<script>

let id = new URLSearchParams(window.location.search).get("id");
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
let duration = 0;

/* THEME */
function toggleDarkMode() {
    const isDark = document.body.classList.toggle("dark");
    localStorage.setItem("theme", isDark ? "dark" : "light");
}

document.addEventListener("DOMContentLoaded", () => {
    if (!localStorage.getItem("user")) {
    window.location.href = "login.html";
}
    const theme = localStorage.getItem("theme");
    if (theme === "dark") document.body.classList.add("dark");
    loadTask();
});

/* LOAD TASK */
const params = new URLSearchParams(window.location.search);
const taskId = params.get("id");

async function loadTask() {
    const user = JSON.parse(localStorage.getItem("user"));

    let res = await fetch(`http://127.0.0.1:8000/tasks/${user.user_id}`);
    let tasks = await res.json();

    let task = tasks.find(t => t.id == taskId);

    if (!task) {
        document.getElementById("taskTitle").innerText = "Task not found";
        return;
    }

    // ✅ SET VALUES
    document.getElementById("taskTitle").innerText = task.title;
    document.getElementById("category").innerText = "📂 " + task.category;
    document.getElementById("priority").innerText = "⚡ " + task.priority;
    document.getElementById("duration").innerText = "⏱ " + task.duration + " days";
    duration=task.duration;
    createCalendar();
}

/* CALENDAR */
function createCalendar() {
    let calendar = document.getElementById("calendar");
    calendar.innerHTML = "";

    let saved = JSON.parse(localStorage.getItem("task_" + id)) || [];

    let today = new Date();
    today.setHours(0, 0, 0, 0);

    let firstDay = new Date(currentYear, currentMonth, 1).getDay();
    let daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

    document.getElementById("monthTitle").innerText =
        new Date(currentYear, currentMonth).toLocaleString('default', {
            month: 'long',
            year: 'numeric'
        });

    for (let i = 0; i < firstDay; i++) {
        calendar.appendChild(document.createElement("div"));
    }

    for (let day = 1; day <= daysInMonth; day++) {

        let div = document.createElement("div");
        div.className = "day";
        div.innerText = day;

        let date = new Date(currentYear, currentMonth, day);
        date.setHours(0, 0, 0, 0);

        let dateStr = date.toISOString().split("T")[0];

        if (saved.includes(dateStr)) {
            div.classList.add("done");
        }

        // highlight today
        let today = new Date();
        let todayStr =
            today.getFullYear() + "-" +
            String(today.getMonth() + 1).padStart(2, "0") + "-" +
            String(today.getDate()).padStart(2, "0");
        if (dateStr === todayStr) {
             div.classList.add("today");
        }
        if (duration === 0) {
        document.getElementById("progressText").innerText = "No duration set";
        }
        if (date < today) {
            div.classList.add("disabled");
        } else {
           div.onclick = function () {

    let saved = JSON.parse(localStorage.getItem("task_" + id)) || [];

    // prevent clicking more than duration
    if (saved.length >= duration) {
        alert("Task already completed!");
        return;
    }

    // prevent duplicate click
    if (saved.includes(dateStr)) {
        return;
    }

    // add only once
    saved.push(dateStr);

    div.classList.add("done");

    localStorage.setItem("task_" + id, JSON.stringify(saved));

    updateProgress();
};
        }
        console.log("Calendar running");

        calendar.appendChild(div);
    }

    updateProgress();
}

/* PROGRESS */
function updateProgress() {
    let saved = JSON.parse(localStorage.getItem("task_" + id)) || [];
    let done = saved.length;

    let percent = duration === 0 ? 0 : Math.floor((done / duration) * 100);

    if (done > duration) done = duration;
    if (percent > 100) percent = 100;

    let circle = document.getElementById("circle");
    circle.style.transition = "0.5s";

    document.getElementById("percent").innerText = percent + "%";
    document.getElementById("progressText").innerText =
        done >= duration ? "🎉 Completed!" : `${done} / ${duration}`;

    document.getElementById("circle").style.background =
        `conic-gradient(#22c55e ${percent * 3.6}deg, #e5e7eb 0deg)`;
}
async function saveProgress() {
    let saved = JSON.parse(localStorage.getItem("task_" + id)) || [];

    console.log("NEW CODE RUNNING");  // 👈 ADD THIS

    await fetch(`http://127.0.0.1:8000/task-progress/${id}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            progress: saved.length
        })
    });

    alert("Progress saved successfully!");
}

/* NAV */
function nextMonth() {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    createCalendar();
}

function prevMonth() {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    createCalendar();
}


</script>

</body>
</html>
