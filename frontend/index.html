<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <style>
    body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

/* MAIN CARD */
.container {
    position: relative;
    width: 420px;
    margin: 80px auto;
    background: rgba(255, 255, 255, 0.95);
    padding: 25px;
    border-radius: 18px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    backdrop-filter: blur(10px);
    text-align: center;
    transition: 0.3s;
}

.container:hover {
    transform: translateY(-5px);
}

/* TITLE */
h1 {
    margin-bottom: 20px;
    font-weight: 600;
    color: #333;
}

/* INPUTS */
input {
    width: 90%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    margin-bottom: 12px;
    outline: none;
    font-size: 14px;
}

/* BUTTONS */
button {
    padding: 10px 18px;
    margin: 6px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 500;
    transition: 0.3s;
}

/* ADD BUTTON */
button:nth-child(4) {
    background: #6366f1;
    color: white;
}

button:nth-child(4):hover {
    background: #4f46e5;
}

/* SHOW BUTTON */
button:nth-child(5) {
    background: #22c55e;
    color: white;
}

button:nth-child(5):hover {
    background: #16a34a;
}

/* TASK LIST */
ul {
    list-style: none;
    padding: 0;
    margin-top: 15px;
}

/* TASK CARD */
li {
    background: white;
    margin: 12px 0;
    padding: 12px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.2s;
}

li:hover {
    transform: scale(1.02);
}

/* TASK ROW */
.task-row {
    display: grid;
    grid-template-columns: 30px 1fr 70px 60px 60px;
    align-items: center;
    gap: 8px;
}

/* TITLE */
.task-title {
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
}

/* BUTTONS */
.task-row button {
    padding: 5px 8px;
    font-size: 12px;
    border-radius: 6px;
}

.task-row button:hover {
    background: #16a34a;
}

/* DELETE BUTTON */
.task-row button:last-child {
    background: #ef4444;
}

.task-row button:last-child:hover {
    background: #dc2626;
}

/* PRIORITY COLORS */
.high, .medium, .low {
    padding: 4px 8px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    color: white;
}

.high { background: #ef4444; }
.medium { background: #f59e0b; }
.low { background: #22c55e; }

/* DONE */
.done {
    text-decoration: line-through;
    opacity: 0.6;
}

/* DARK MODE */
.dark {
    background: #0f172a;
}

.dark .container {
    background: #1e293b;
    color: white;
}

.dark input {
    background: #334155;
    color: white;
    border: none;
}

.dark li {
    background: #334155;
}

/* SIDE TOGGLE */
.theme-toggle {
    position: fixed;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    background: #6366f1;
    color: white;
    padding: 12px;
    border-radius: 12px 0 0 12px;
    cursor: pointer;
}
#toast {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #22c55e;
    color: white;
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 14px;
    transition: 0.4s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
.category {
    background: #6366f1;
    color: white;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 11px;
}
button:active {
    transform: scale(0.95);
}
#toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #22c55e;
    color: white;
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 14px;
    opacity: 0;
    transition: 0.4s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
</style>
</head>
<body>
    <div class="container">
        <h1>🤖Task Manager</h1>
        
        <input type="text" id="taskInput" placeholder="Enter your task">
        <input type="number" id="durationInput" placeholder="Enter duration (days)">

        <br>
        <button onclick="addTask(event)">➕ Add Task</button>
        <button onclick="getTasks()">📋 Show Tasks</button>

        <p id="result"></p>
        <p id="toast"></p>
        <ul id="taskList"></ul>
    </div>
    <div class="theme-toggle" onclick="toggleDarkMode()">
    🌙
    </div>
    <script src="script.js">
</script>
</body>
</html>
